name: Build Debug APK (PR)

on:
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app-android-todo/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: app-android-todo
        run: npm ci

      - name: Generate Android project
        working-directory: app-android-todo
        run: npx expo prebuild --platform android --non-interactive

      - name: Build Debug APK
        working-directory: app-android-todo/android
        run: ./gradlew :app:assembleDebug --stacktrace --no-daemon

      - name: Upload debug APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ github.event.pull_request.number || github.run_number }}
          if-no-files-found: error
          path: |
            app-android-todo/android/app/build/outputs/apk/debug/*.apk
            app-android-todo/android/app/build/outputs/apk/*/debug/*.apk
