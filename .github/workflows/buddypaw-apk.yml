name: Build BuddyPaw APK

on:
  workflow_dispatch:
  push:
    branches:
      - '**'
    paths:
      - 'ci/buddypaw_template/**'
      - '.github/workflows/buddypaw-apk.yml'

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Create Flutter project
        run: flutter create buddypaw --platforms=android --org com.kingjjy.buddypaw --project-name buddypaw

      - name: Replace app source
        run: |
          cp ci/buddypaw_template/lib/main.dart buddypaw/lib/main.dart

      - name: Build APK (release)
        working-directory: buddypaw
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: buddypaw-apk-${{ github.run_number }}
          path: buddypaw/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
