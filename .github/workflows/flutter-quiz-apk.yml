name: Build Flutter Quiz APK

on:
  workflow_dispatch:
  push:
    branches:
      - '**'
    paths:
      - 'ci/flutter_template/**'
      - '.github/workflows/flutter-quiz-apk.yml'

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Create Flutter project
        run: flutter create tinyping_quiz --platforms=android --org com.kingjjy.quiz --project-name tinyping_quiz

      - name: Replace app source
        run: |
          cp ci/flutter_template/lib/main.dart tinyping_quiz/lib/main.dart
          mkdir -p tinyping_quiz/assets/images
          cp -r ci/flutter_template/assets/images/. tinyping_quiz/assets/images/

      - name: Enable Flutter assets
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('tinyping_quiz/pubspec.yaml')
          s = p.read_text()
          if '    - assets/images/' not in s:
            marker = '  uses-material-design: true\n'
            if marker in s:
              s = s.replace(marker, marker + '  assets:\n    - assets/images/\n', 1)
            else:
              raise SystemExit('pubspec.yaml marker not found: uses-material-design')
          p.write_text(s)
          print('updated pubspec assets section')
          PY
          echo "--- pubspec assets check ---"
          grep -n "assets/images" tinyping_quiz/pubspec.yaml
          echo "--- copied assets check ---"
          ls -lah tinyping_quiz/assets/images

      - name: Build APK (release)
        working-directory: tinyping_quiz
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tinyping-quiz-apk-${{ github.run_number }}
          path: tinyping_quiz/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
