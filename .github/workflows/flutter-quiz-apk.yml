name: Build Flutter Quiz APK

on:
  workflow_dispatch:
  push:
    branches:
      - '**'
    paths:
      - 'ci/flutter_template/**'
      - '.github/workflows/flutter-quiz-apk.yml'

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Create Flutter project
        run: flutter create tinyping_quiz --platforms=android --org com.kingjjy.quiz --project-name tinyping_quiz

      - name: Replace app source
        run: |
          cp ci/flutter_template/lib/main.dart tinyping_quiz/lib/main.dart

      - name: Build APK (release)
        working-directory: tinyping_quiz
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tinyping-quiz-apk-${{ github.run_number }}
          path: tinyping_quiz/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
